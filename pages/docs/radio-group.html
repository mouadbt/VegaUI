<h2>Radio Group</h2>
<p class="section-meta">A set of checkable buttons—known as radio buttons—where no more than one of the buttons can be checked at a time.</p>

        <label class="radio-label">

        </label>
        <label class="radio-label">

<h3>Choice Card</h3>
<p class="section-meta">Card-style selection where the wrapper acts as a clickable card pattern.</p>
<style>
    .radio-card-showcase {
        background-color: var(--background);
        transition: border-color 100ms ease, background-color 100ms ease;
    }
    .radio-card-showcase:has(.radio:checked) {
        border-color: var(--accent);
        background-color: color-mix(in oklch, var(--accent) 15%, transparent);
    }
    .dark .radio-card-showcase:has(.radio:checked) {
        background-color: color-mix(in oklch, var(--accent) 15%, transparent);
    }
</style>
<preview>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; width: 100%; max-width: 500px;">
        <label class="card radio-card-showcase" style="display: flex; flex-direction: column; padding: 1rem; gap: 1rem; cursor: pointer;">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
