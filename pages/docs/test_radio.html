<!DOCTYPE html>
<html>
<body>
    <input type="radio" name="tg" value="1" onclick="if(this.dataset.checked==='1'){this.checked=false;this.dataset.checked='0';}else{document.querySelectorAll('[name=tg]').forEach(el=>el.dataset.checked='0');this.dataset.checked='1';}">
    <input type="radio" name="tg" value="2" onclick="if(this.dataset.checked==='1'){this.checked=false;this.dataset.checked='0';}else{document.querySelectorAll('[name=tg]').forEach(el=>el.dataset.checked='0');this.dataset.checked='1';}">
</body>
</html>
